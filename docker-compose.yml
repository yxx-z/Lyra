services:
  lyra:
    image: lyra:latest
    build: .
    working_dir: /app
    command: ["lyra", "--config", "/app/config.yaml"]
    ports:
      - "4533:4533"
    volumes:
      - ./config.yaml:/app/config.yaml:ro
      - /home/yxx/music:/music
      - ./data:/app/data
    environment:
      - LIBRARY_PATHS=/music
    restart: unless-stopped
